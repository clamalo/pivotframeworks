<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Team - Pivot Frameworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2.5rem;
      margin: 3rem 0;
    }
    
    .team-member {
      text-align: center;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }
    
    .team-member:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    
    .team-member img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      margin-bottom: 1.5rem;
      border: 4px solid #004e92;
      object-fit: cover;
    }
    
    .team-member h3 {
      font-size: 1.8rem;
      color: #000428;
      margin-bottom: 0.5rem;
    }
    
    .team-member p {
      color: #636e72;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Our Team</h1>
    <p>Meet the innovators behind Pivot Frameworks</p>
  </header>

  <div id="nav-placeholder"></div>
  <script src="./js/loadNav.js"></script>

  <main>
    <h2>The Minds Behind Our Success</h2>
    <div class="team-grid">
      <div class="team-member">
        <img src="https://via.placeholder.com/180" alt="Finn">
        <h3>Finn</h3>
        <p>Chief Executive Officer</p>
      </div>
      <div class="team-member">
        <img src="https://via.placeholder.com/180" alt="Clay">
        <h3>Clay</h3>
        <p>Chief Operating Officer<br>&<br>Chief Technology Officer</p>
      </div>
      <div class="team-member">
        <img src="https://via.placeholder.com/180" alt="Ryder">
        <h3>Ryder</h3>
        <p>Chief Strategy Officer<br>Chief Marketing Officer<br>Chief Financial Officer</p>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Pivot Frameworks. All rights reserved.</p>
  </footer>
</body>
</html>
