<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Get in touch with Pivot Frameworks - let's discuss how we can transform your ideas into reality through our innovative process.">
  <title>Contact - Pivot Frameworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Contact Us</h1>
    <p>Let's discuss how we can help bring your ideas to life</p>
  </header>

  <div id="nav-placeholder"></div>
  <script src="./js/loadNav.js"></script>

  <main>
    <h2>Get in Touch</h2>
    <form class="contact-form" onsubmit="event.preventDefault(); handleSubmit();">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" required placeholder="Your Name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="your.email@example.com">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" required placeholder="Tell us about your project..."></textarea>
      </div>
      <button type="submit" class="cta-button">Send Message</button>
    </form>
  </main>

  <div id="footer-placeholder"></div>
  <script src="./js/loadFooter.js"></script>

  <script>
    function handleSubmit() {
      alert("Message sent! We'll get back to you soon.");
      document.querySelector('form').reset();
    }
  </script>
</body>
</html>
