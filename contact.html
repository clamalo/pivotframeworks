<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - Pivot Frameworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Contact-specific styles */
    .contact-form {
      max-width: 600px;
      margin: 0 auto;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #2d3436;
      font-weight: 500;
    }
    
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #000428;
      box-shadow: 0 0 0 3px rgba(0, 4, 40, 0.1);
    }
    
    .form-group textarea {
      height: 150px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <header>
    <h1>Contact Us</h1>
    <p>Let's discuss how we can help bring your ideas to life</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main>
    <h2>Get in Touch</h2>
    <form class="contact-form" onsubmit="event.preventDefault(); handleSubmit();">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" required></textarea>
      </div>
      <button type="submit" class="cta-button">Send Message</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Pivot Frameworks. All rights reserved.</p>
  </footer>

  <script>
    function handleSubmit() {
      alert("Message sent! We'll get back to you soon.");
      document.querySelector('form').reset();
    }
  </script>
</body>
</html>
